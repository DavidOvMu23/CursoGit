site_name: 'Practica Mkdocs David Oviedo'
site_url: 'https://midominio.com'
site_author: 'David Oviedo'
site_description: 'Practica Mkdocs David Oviedo'

theme:
  features:
    - content.action.edit
    - content.action.view
#     - navigation.tabs
#     - navigation.tabs.sticky
  name: 'material'
  palette:
    primary: 'indigo'
    accent: 'blue'
  font:
    text: 'Roboto'
  google_analytics:
    property: 'UA-12345678-9'
    auto: true

nav:
  - Home: index.md
  - Sistemas Informáticos: sistemas.md
  - Programación: programacion.md
  - Lenguaje de Marcas: lenguajes.md
  - Base de datos: bases.md
  - Entornos de desarrollo: entornos.md
  - Proyecto Intermodular: proyecto.md
  - Inglés: ingles.md

plugins:
  - search
  - macros

extra_css:
  - 'styles/extra.css'
extra_javascript:
  - 'js/custom.js'

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - codehilite:
      guess_lang: false

repo_url: 'https://github.com/StarLord5-4/Proyecto-Mkdocs'
repo_name: 'Proyecto-MKdocs'
edit_uri: 'edit/main/docs/'

use_directory_urls: true
strict: true